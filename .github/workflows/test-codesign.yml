name: Test Code Signing

on:
  push:
    tags:
      - 'test-sign-*'

jobs:
  test-sign:
    runs-on: macos-14

    steps:
      - name: Debug certificate import
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -x

          echo "=== Password debug ==="
          echo "Password value: $MACOS_CERTIFICATE_PWD"
          echo "Password length: ${#MACOS_CERTIFICATE_PWD}"
          echo "Password hex:"
          echo -n "$MACOS_CERTIFICATE_PWD" | xxd | head -5

          echo "=== Certificate debug ==="
          echo "Certificate base64 length: ${#MACOS_CERTIFICATE}"
          echo "Certificate first 40 chars: ${MACOS_CERTIFICATE:0:40}"

          CERT_FILE="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_FILE="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="build-keychain-pwd"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_FILE"
          echo "p12 file size: $(wc -c < "$CERT_FILE") bytes"
          echo "p12 file type: $(file "$CERT_FILE")"
          echo "p12 sha256: $(shasum -a 256 "$CERT_FILE")"

          echo "=== OpenSSL p12 info ==="
          openssl pkcs12 -in "$CERT_FILE" -info -passin pass:"$MACOS_CERTIFICATE_PWD" -nokeys 2>&1 || true
          echo "=== Try with -legacy ==="
          openssl pkcs12 -in "$CERT_FILE" -info -passin pass:"$MACOS_CERTIFICATE_PWD" -nokeys -legacy 2>&1 || true

          echo "=== Keychain setup ==="
          security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"

          echo "=== Import certificate ==="
          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE" 2>&1 || true

          echo "=== Keychain contents ==="
          security list-keychains -d user -s "$KEYCHAIN_FILE" login.keychain-db
          security find-identity -v "$KEYCHAIN_FILE" 2>&1
          security find-identity -v -p codesigning "$KEYCHAIN_FILE" 2>&1

          echo "=== Try signing a test binary ==="
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_FILE" \
            | grep -m1 '"' | sed 's/.*"\(.*\)"/\1/')
          echo "Extracted identity: '$IDENTITY'"

          if [ -n "$IDENTITY" ]; then
            echo 'int main() { return 0; }' > /tmp/test.c
            clang -o /tmp/test_binary /tmp/test.c
            codesign --force --sign "$IDENTITY" /tmp/test_binary 2>&1
            codesign --verify --verbose /tmp/test_binary 2>&1
            codesign -dvv /tmp/test_binary 2>&1
            echo "=== ALL PASSED ==="
          else
            echo "=== FAILED: No codesigning identity found ==="
            exit 1
          fi

          rm -f "$CERT_FILE"
